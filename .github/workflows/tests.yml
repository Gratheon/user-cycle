name: tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit test suite
        run: npm run test:unit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: user-cycle
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ptest"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start service
        run: |
          ENV_ID=ci npm run dev:ts > user-cycle.log 2>&1 &
          echo $! > user-cycle.pid

      - name: Wait for service health
        run: |
          for i in {1..90}; do
            if curl -sf http://127.0.0.1:4000/health >/dev/null; then
              echo "Service is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Service did not become healthy in time"
          tail -n 200 user-cycle.log || true
          exit 1

      - name: Run integration test suite
        run: npm run test:integration

      - name: Show service log on failure
        if: failure()
        run: tail -n 200 user-cycle.log || true

      - name: Stop service
        if: always()
        run: |
          if [ -f user-cycle.pid ]; then
            kill $(cat user-cycle.pid) || true
          fi
